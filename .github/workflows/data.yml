name: Data

on:
  push:
    branches: [main]
    paths:
      - 'src/data/**'
      - 'public/logos/**'
      - 'scripts/validate.ts'
      - '.github/workflows/data.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/data/**'
      - 'public/logos/**'
      - 'scripts/validate.ts'
      - '.github/workflows/data.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Validate
        run: npm run validate
